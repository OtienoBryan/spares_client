<!doctype html>
<html lang="en-KE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>%VITE_SITE_DEFAULT_TITLE%</title>

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <meta property="og:site_name" content="%VITE_COMPANY_NAME%" />
